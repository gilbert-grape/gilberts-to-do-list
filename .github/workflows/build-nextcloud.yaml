name: Build Nextcloud App

on:
  push:
    branches: [master]
    paths:
      - "frontend/**"
      - "nextcloud-app/**"
    tags:
      - "nc-v*"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build for Nextcloud
        working-directory: frontend
        run: npm run build:nc

      - name: Package tar.gz
        working-directory: nextcloud-app
        run: |
          tar czf gilbertstodo.tar.gz \
            --transform 's,^,gilbertstodo/,' \
            appinfo/ lib/ templates/ js/ img/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: gilbertstodo
          path: nextcloud-app/gilbertstodo.tar.gz

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/nc-v')
        uses: softprops/action-gh-release@v2
        with:
          files: nextcloud-app/gilbertstodo.tar.gz
